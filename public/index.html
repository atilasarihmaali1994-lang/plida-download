<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PLIDA - Download Certificato</title>
</head>
<body>
  <h1>Società Dante Alighieri</h1>
  <h2>PLIDA - Download Certificato</h2>

  <form id="form">
    <label>Cognome</label><br>
    <input type="text" name="cognome" required><br><br>

    <label>Nome</label><br>
    <input type="text" name="nome" required><br><br>

    <button type="submit">Accedi al documento</button>
  </form>

  <div id="result"></div>

  <script>
    const form = document.getElementById("form");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const dati = Object.fromEntries(new FormData(form).entries());

      const risposta = await fetch("/api/verifica", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(dati)
      });

      const json = await risposta.json();

      if (!json.ok) {
        result.innerHTML = json.message || "Errore";
        return;
      }

      result.innerHTML = `
        <br>
        Accesso completato.<br><br>
        <a href="${json.downloadUrl}" download>Scarica certificato</a>
      `;
    });
  </script>
</body>
</html>
